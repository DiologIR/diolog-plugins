<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Diolog — email mockups</title>

  <!-- Fonts. Newsreader (serif display), Inter (sans), JetBrains Mono (tickers/dates/counts). -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ▼▼▼ INLINE THE FULL CONTENTS OF assets/mock-kit.css HERE ▼▼▼
       (the skill builds a SINGLE self-contained file — the browser screenshot
        and the Figma build both read this file with no build step). ▲▲▲ */

    /* — Page scaffold (not part of the kit) — */
    body { margin: 0; background: #EEF1F6; }
    .dio-page-title {
      font-family: var(--dio-serif);
      font-weight: 500;
      font-size: 26px;
      color: var(--dio-fg-primary);
      padding: 40px 56px 0;
      margin: 0;
    }
  </style>
</head>
<body>
  <h1 class="dio-page-title">Diolog · product-update email mockups</h1>

  <!-- Worked examples of the treatments, in priority order. Read
       references/mockup-playbook.md first — the rules below are baked into them:
       lead with the WOW and make the product look SMART (a real insight, an italic
       quote from the record, named source chips — not lorem chrome), keep only real
       product chrome text (no taglines / explainers / "powered by"), make it rich
       and tailored (Flight Centre data), use the real .dio-logo. Example 0 is the
       PREMIUM register: a full product window (clean browser chrome + the COMPLETE
       app shell) — the default for any HERO web feature. Example 5 is the OPTIONAL
       email-hero (split) register. Two things every set must honour and these model:
       (1) every clean-shot artboard carries a brief, non-technical marketing summary
       UNDER the mock as a .dio-artboard__note (for IR teams + their agencies; sentence
       case; NO em/en-dashes) — see examples 0 and 4; the email-hero carries its benefit
       in-column instead, so it has none. (2) Semantic emphasis is a soft WASH + an icon
       tile + a chip, NEVER a coloured left-only border (the AI-slop tell) — see the
       reworked verdict tile in example 5. Icons are inline SVG (so screenshots
       rasterise them), never icon-font ligatures. -->
  <div class="dio-canvas">

    <!-- ══════════════════════════════════════════════════════════════════
         0 · PRODUCT WINDOW  (THE PREMIUM DEFAULT for a hero web feature)
         A clean browser window wrapping the COMPLETE app shell — rail + real
         wordmark + ONE lit nav item + company switcher + avatar — with a big,
         SUBSTANTIVE hero: a real insight, an italic quote from the record, named
         source chips, the real assistant persona (Guardian). This is what
         best-in-class reference sets use. Still an impression: the rail is
         ghosted and ONE thing is heroed. Feature: AI chat. (playbook §4A + §2)
         ══════════════════════════════════════════════════════════════════ -->
    <figure class="dio-artboard">
      <figcaption class="dio-artboard__title">Web · Ask Guardian</figcaption>
      <div class="dio-board dio-board--soft" style="width:980px;height:624px;padding:40px;">
        <div class="dio-browser" style="box-shadow:var(--dio-shadow-lg);">
          <div class="dio-browser__bar">
            <div class="dio-browser__lights"><i></i><i></i><i></i></div>
            <div class="dio-browser__url">app.diolog.com/conversations</div>
          </div>
          <div class="dio-appshell">
            <!-- rail: the REAL wordmark + ONE lit nav item, the rest ghosted, avatar pinned bottom -->
            <div class="dio-appshell__rail">
              <span class="dio-logo">
                <span class="dio-logo__tile"><svg viewBox="0 0 262 243" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M93.562 0C42.0867 0 0.323744 41.4391 0 92.9143V187.447H94.5332C146.008 187.124 187.448 145.361 187.448 93.8855C187.448 42.0866 145.361 0 93.562 0Z" fill="#011837"/><path d="M0 220.469C1.29498 213.346 1.29498 207.195 11.9785 197.483C21.6908 188.742 31.4032 187.447 34.6406 187.447H0V220.469Z" fill="#011837"/><path d="M251.649 46.4479C242.272 55.3 232.896 56.6114 229.771 56.6114H263.212V23.1701C261.962 30.3829 261.962 36.6122 251.649 46.4479Z" fill="#ededf0"/><path d="M168.994 55.0365C117.519 55.3602 76.0797 97.1231 76.0797 148.598C76.0797 200.397 118.166 242.16 169.642 242.16C221.117 242.16 262.88 200.721 263.204 149.246V55.0365H168.994Z" fill="#ededf0"/></svg></span>
                <span class="dio-logo__word">diolog</span>
              </span>
              <div class="dio-navitem is-active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a8 8 0 0 1-11.5 7.2L4 20l1-5A8 8 0 1 1 21 12z"/></svg>Conversations</div>
              <div class="dio-navitem dio-navitem--ghost"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 13h4l2 3h4l2-3h4"/><path d="M4 13 6 5h12l2 8v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1z"/></svg><span class="dio-ghost-bar"></span></div>
              <div class="dio-navitem dio-navitem--ghost"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3v5h5"/><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg><span class="dio-ghost-bar"></span></div>
              <div class="dio-navitem dio-navitem--ghost"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg><span class="dio-ghost-bar"></span></div>
              <div class="dio-navitem dio-navitem--ghost"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10z"/></svg><span class="dio-ghost-bar"></span></div>
              <span class="dio-avatar" style="margin-top:auto;">NB</span>
            </div>
            <div class="dio-appshell__main">
              <div class="dio-appshell__topbar">
                <span class="dio-ghost-bar" style="width:120px;"></span>
                <span class="dio-coswitch" style="margin:0 auto;">
                  <span class="dio-coswitch__mark">F</span>
                  <span class="dio-coswitch__name">Flight Centre</span>
                  <span class="dio-coswitch__ticker">ASX: FLT</span>
                </span>
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--dio-fg-muted)" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--dio-fg-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
              </div>
              <div class="dio-appshell__stage">
                <!-- the user's question — navy bubble, right-aligned -->
                <div style="display:flex;justify-content:flex-end;margin-bottom:22px;">
                  <div style="max-width:520px;background:var(--dio-accent);color:#fff;font-size:16px;font-weight:600;line-height:1.4;padding:16px 20px;border-radius:16px 16px 4px 16px;">Are we exposed on H2 corporate demand against our own disclosure?</div>
                </div>
                <!-- Guardian's SUBSTANTIVE answer: persona + real insight + italic quote + named sources -->
                <div class="dio-card" style="max-width:600px;padding:24px 26px;box-shadow:var(--dio-shadow-md);">
                  <div class="dio-persona" style="margin-bottom:14px;">
                    <span class="dio-persona__mark"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.9 6.1L20 10l-6.1 1.9L12 18l-1.9-6.1L4 10l6.1-1.9z"/></svg></span>
                    <span class="dio-persona__name">Guardian</span>
                    <span class="dio-persona__role">· Market intelligence</span>
                  </div>
                  <p class="dio-body" style="margin:0;font-size:16px;color:var(--dio-fg-primary);text-wrap:pretty;">Your last guidance called bookings <span class="dio-quote">"recovering ahead of schedule."</span> Two peers now point the other way for H2 — your prepared remarks still carry the old framing.</p>
                  <div style="margin-top:18px;padding-top:15px;border-top:1px solid var(--dio-border-faint);">
                    <div class="dio-label" style="margin-bottom:10px;">Sourced from</div>
                    <div class="dio-sources">
                      <span class="dio-source"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2v5h5"/><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7z"/></svg>FY25 results · p.12</span>
                      <span class="dio-source"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2v5h5"/><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7z"/></svg>Q3 update · draft</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- the brief, non-technical benefit for IR teams + agencies, UNDER the mock (no em-dashes) -->
      <p class="dio-artboard__note">Ask a question in plain English and get an answer grounded in your own filings, with the sources it drew on.</p>
    </figure>

    <!-- ══════════════════════════════════════════════════════════════════
         1 · PRODUCT-SURFACE VIGNETTE  (the compact register — secondary/thin)
         The feature region itself — NO browser chrome. A thin lit in-app rail
         says "this is the app"; the hero is the PAYOFF (the AI-drafted reply),
         not generic UI. Feature: Smart Inbox — a drafted, on-record reply.
         ══════════════════════════════════════════════════════════════════ -->
    <figure class="dio-artboard">
      <figcaption class="dio-artboard__title">Web · Drafted reply</figcaption>
      <div class="dio-board dio-board--soft" style="width:760px;height:520px;padding:40px;">
        <!-- the app stage: a white surface, no traffic lights / URL bar -->
        <div class="dio-card" style="display:flex;overflow:hidden;box-shadow:var(--dio-shadow-lg);height:440px;">
          <!-- THIN lit in-app rail (≤96px) — enough to read as "the app" -->
          <div style="width:84px;flex:none;background:var(--dio-bg-sidebar);border-right:1px solid var(--dio-border-faint);padding:16px 0;display:flex;flex-direction:column;align-items:center;gap:14px;">
            <span class="dio-logo__tile" style="box-shadow:var(--dio-shadow-sm);">
              <svg viewBox="0 0 262 243" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M93.562 0C42.0867 0 0.323744 41.4391 0 92.9143V187.447H94.5332C146.008 187.124 187.448 145.361 187.448 93.8855C187.448 42.0866 145.361 0 93.562 0Z" fill="#011837"/><path d="M0 220.469C1.29498 213.346 1.29498 207.195 11.9785 197.483C21.6908 188.742 31.4032 187.447 34.6406 187.447H0V220.469Z" fill="#011837"/><path d="M251.649 46.4479C242.272 55.3 232.896 56.6114 229.771 56.6114H263.212V23.1701C261.962 30.3829 261.962 36.6122 251.649 46.4479Z" fill="#ededf0"/><path d="M168.994 55.0365C117.519 55.3602 76.0797 97.1231 76.0797 148.598C76.0797 200.397 118.166 242.16 169.642 242.16C221.117 242.16 262.88 200.721 263.204 149.246V55.0365H168.994Z" fill="#ededf0"/></svg>
            </span>
            <span class="dio-ghost-circle" style="width:30px;background:var(--dio-accent-soft);"></span>
            <span class="dio-ghost-circle" style="width:30px;"></span>
            <span class="dio-ghost-circle" style="width:30px;"></span>
          </div>
          <!-- main: the incoming question (ghosted), then the LIT AI draft -->
          <div style="flex:1;padding:26px 28px;display:flex;flex-direction:column;gap:18px;min-width:0;">
            <div class="dio-ghost-row">
              <span class="dio-avatar">MC</span>
              <div style="min-width:0;flex:1;">
                <div class="dio-body" style="margin:0;font-size:13px;color:var(--dio-fg-secondary);">Margaret Chen · Email</div>
                <div class="dio-body" style="margin:2px 0 0;font-size:13px;color:var(--dio-fg-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">How are you thinking about margins given airline pricing?</div>
              </div>
            </div>
            <div>
              <div style="display:flex;align-items:center;gap:10px;">
                <span class="dio-label">Drafted reply</span>
                <span class="dio-chip">Professional</span>
                <span class="dio-chip dio-chip--success"><span class="dio-dot"></span>Consistent with record</span>
              </div>
              <div class="dio-detect" style="padding:20px;margin-top:12px;">
                <p class="dio-body" style="margin:0;color:var(--dio-fg-primary);text-wrap:pretty;">Thanks for your question on margins. As noted in our H1 results, we expect cost discipline to hold through the half, with airline pricing a watch-item rather than a guidance change.</p>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:12px;margin-top:auto;">
              <button class="dio-btn">Approve &amp; send</button>
              <span style="display:inline-flex;align-items:center;gap:8px;" class="dio-body"><span class="dio-avatar" style="width:26px;height:26px;font-size:11px;">NB</span>Routed to Nathan B.</span>
            </div>
          </div>
        </div>
      </div>
    </figure>

    <!-- ══════════════════════════════════════════════════════════════════
         2 · SOFT PANEL + PEEKING DEVICE  (the "new feature" reveal)
         Feature: "Ask the IR team — on the record" (Question Composer, mobile).
         Give the peeking device enough content that it CLIPS (peeks), not floats.
         ══════════════════════════════════════════════════════════════════ -->
    <figure class="dio-artboard">
      <figcaption class="dio-artboard__title">Mobile · Ask on the record</figcaption>
      <div class="dio-board dio-board--white" style="width:640px;height:500px;">
        <div class="dio-soft-panel" style="width:560px;height:430px;">
          <div class="dio-newtag">New · Question composer</div>
          <div class="dio-card dio-peek" style="width:300px;padding:22px;box-shadow:var(--dio-shadow-lg);">
            <div class="dio-phone__status" style="padding:0;">
              <span class="dio-mono">9:41</span>
              <span class="dots"><i></i><i></i><i></i></span>
            </div>
            <div class="dio-label" style="margin-top:18px;">Ask Flight Centre</div>
            <div class="dio-display" style="font-size:22px;margin-top:4px;">FLT · Travel</div>
            <div style="margin-top:16px;padding:16px;background:var(--dio-bg-soft);border-radius:var(--dio-radius-md);">
              <p class="dio-body" style="margin:0;color:var(--dio-fg-primary);text-wrap:pretty;">How are you thinking about margins given recent shifts in airline pricing dynamics?</p>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;">
              <span class="dio-mono">248 / 500</span>
              <span style="display:inline-flex;align-items:center;gap:7px;font-size:13px;" class="dio-body"><span class="dio-dot"></span>On the record</span>
            </div>
            <button class="dio-btn dio-btn--block" style="margin-top:16px;">Send to IR</button>
          </div>
        </div>
      </div>
    </figure>

    <!-- ══════════════════════════════════════════════════════════════════
         3 · COLLAGE / OVERLAP  (a finding tile on the surface it acts on)
         The wow isn't the verdict card in isolation — it's the verdict landing
         ON a real draft. Base = the announcement draft; overlay = the verdict.
         Feature: Disclosure risk monitoring.
         ══════════════════════════════════════════════════════════════════ -->
    <figure class="dio-artboard">
      <figcaption class="dio-artboard__title">Web · Risk flagged on a draft</figcaption>
      <div class="dio-board dio-board--soft" style="width:680px;height:500px;">
        <div class="dio-collage" style="width:560px;">
          <!-- base: the draft being written -->
          <div class="dio-card" style="padding:26px 28px;box-shadow:var(--dio-shadow-md);">
            <div class="dio-label">Draft announcement</div>
            <div class="dio-display" style="font-size:22px;margin:8px 0 16px;text-wrap:pretty;">FY25 results &amp; outlook</div>
            <div style="display:flex;flex-direction:column;gap:11px;">
              <div class="dio-ghost-bar" style="width:96%;"></div>
              <div class="dio-ghost-bar" style="width:88%;"></div>
              <div class="dio-ghost-bar" style="width:70%;"></div>
              <div class="dio-ghost-bar" style="width:92%;"></div>
              <div class="dio-ghost-bar" style="width:60%;"></div>
            </div>
          </div>
          <!-- overlay: the verdict, collaged over the lower-right corner -->
          <div class="dio-collage__over dio-detect dio-detect--danger" style="right:-18px;bottom:-22px;width:320px;padding:18px;background:var(--dio-bg-canvas);">
            <div style="display:flex;align-items:center;gap:10px;">
              <span class="tile" style="width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--dio-radius-md);background:var(--dio-danger-soft);color:var(--dio-danger);">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.9 2.4 18a1.8 1.8 0 0 0 1.6 2.7h16a1.8 1.8 0 0 0 1.6-2.7L13.7 3.9a1.8 1.8 0 0 0-3.4 0z"/><line x1="12" y1="9" x2="12" y2="13"/><circle cx="12" cy="17" r=".6" fill="currentColor"/></svg>
              </span>
              <span class="dio-display" style="font-size:18px;color:var(--dio-danger);flex:1;">Escalate</span>
              <span class="dio-num" style="font-size:26px;">86%</span>
            </div>
            <p class="dio-body" style="margin:12px 0 0;font-size:13px;color:var(--dio-fg-primary);text-wrap:pretty;">Guidance wording may pre-empt your continuous-disclosure obligation.</p>
            <div style="display:flex;align-items:center;gap:8px;margin-top:12px;">
              <span class="dio-mono" style="background:var(--dio-bg-soft);border-radius:6px;padding:2px 7px;color:var(--dio-fg-primary);">LR 3.1</span>
              <button class="dio-btn" style="margin-left:auto;padding:8px 14px;font-size:13px;">Review</button>
            </div>
          </div>
        </div>
      </div>
    </figure>

    <!-- ══════════════════════════════════════════════════════════════════
         4 · WEBSITE FRAME  (use ONLY when the thing IS a public website)
         A generated, branded investor portal — the tailored URL + the real
         .dio-logo are part of the story (it proves a real, customisable site).
         Do NOT use this frame as a generic "this is the web app" wrapper.
         Feature: Investor portal builder.
         ══════════════════════════════════════════════════════════════════ -->
    <figure class="dio-artboard">
      <figcaption class="dio-artboard__title">Web · Branded investor portal</figcaption>
      <div class="dio-board dio-board--soft" style="width:760px;height:520px;padding:40px;">
        <div class="dio-browser" style="max-width:680px;">
          <div class="dio-browser__bar">
            <div class="dio-browser__lights"><i></i><i></i><i></i></div>
            <div class="dio-browser__url">investors.flightcentre.com.au</div>
          </div>
          <div style="padding:26px 28px;">
            <!-- the customer's own brand lockup — a monogram tile is fine for THEM -->
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;">
              <span class="tile" style="width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;border-radius:7px;background:var(--dio-bg-brand);color:var(--dio-fg-on-dark);font-size:12px;font-weight:700;">F</span>
              <b style="font-family:var(--dio-sans);font-size:14px;color:var(--dio-fg-primary);">Flight Centre</b>
              <span class="dio-mono" style="margin-left:2px;">Investors</span>
            </div>
            <div class="dio-display" style="font-size:26px;margin-bottom:18px;text-wrap:pretty;">FY25 results &amp; outlook</div>
            <div style="display:flex;gap:14px;">
              <div style="flex:none;width:170px;padding:16px;background:var(--dio-accent-soft);border-radius:var(--dio-radius-md);">
                <span class="dio-label" style="color:var(--dio-accent-soft-ink);">Share price</span>
                <div class="dio-display" style="font-size:24px;color:var(--dio-accent-soft-ink);margin-top:6px;">A$19.84</div>
                <div class="dio-mono" style="color:var(--dio-success-text);margin-top:4px;">▲ 1.20%</div>
              </div>
              <div style="flex:1;padding:16px;border:1px solid var(--dio-border-card);border-radius:var(--dio-radius-md);">
                <span class="dio-label">Latest announcement</span>
                <div class="dio-body" style="font-size:14px;font-weight:600;color:var(--dio-fg-primary);margin-top:8px;">Appendix 4D — half-year report</div>
                <div class="dio-mono" style="margin-top:8px;">Lodged 11 Jun</div>
              </div>
            </div>
            <!-- a tasteful sign that this site is powered by diolog (the real mark) -->
            <div style="display:flex;align-items:center;gap:9px;margin-top:20px;padding-top:16px;border-top:1px solid var(--dio-border-faint);">
              <span class="dio-mono">Powered by</span>
              <span class="dio-logo">
                <span class="dio-logo__tile" style="width:22px;height:22px;border-radius:7px;background:var(--dio-bg-brand);">
